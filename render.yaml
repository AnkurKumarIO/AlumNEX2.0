services:
  - type: web
    name: alumnex-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: FRONTEND_URL
        value: https://alum-nex-2-0.vercel.app
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        fromSecret: supabase_url
      - key: SUPABASE_ANON_KEY
        fromSecret: supabase_anon_key
      - key: GROQ_API_KEY
        fromSecret: groq_api_key
      - key: JWT_SECRET
        fromSecret: jwt_secret
